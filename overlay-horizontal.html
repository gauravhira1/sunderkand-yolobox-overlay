<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Horizontal Ticker Overlay</title>
<style>
:root{--text:#fff;--shadow:#000;--fontSize:46px;--lineHeight:1.25}
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:transparent;font-family:"Noto Sans Devanagari","Mangal","Kokila","Arial Unicode MS",Arial,sans-serif}
#stage{position:fixed;inset:0;background:transparent;overflow:hidden}
#tickerBox{position:absolute;left:0;right:0;bottom:4vh;height:90px;background:transparent;overflow:hidden;pointer-events:none}
#ticker{position:absolute;left:0;top:50%;color:var(--text);font-size:var(--fontSize);line-height:var(--lineHeight);font-weight:800;white-space:nowrap;text-shadow:3px 3px 0 var(--shadow),-2px 2px 0 var(--shadow),2px -2px 0 var(--shadow),-2px -2px 0 var(--shadow);will-change:transform}
</style>
</head>
<body>
<div id="stage"><div id="tickerBox"><div id="ticker">Loading text...</div></div></div>
<script>
const ticker=document.getElementById("ticker");
let x=window.innerWidth,speed=90,paused=false,fontSize=46,lastTime=null,lastResetId=0,lastTextVersion=0,lastTextFile="",lastJumpRequestId=0;
function resetTicker(){x=window.innerWidth+40;ticker.style.transform=`translate(${x}px, -50%)`}
function setColours(textColor,shadowColor){ticker.style.color=textColor||"#ffffff";document.documentElement.style.setProperty("--shadow",shadowColor||"#000000")}
function cleanForTicker(text){return(text||"").replace(/\r\n/g,"\n").replace(/\r/g,"\n").replace(/\n+/g,"   •   ").replace(/\s+/g," ").trim()}
async function loadTextFile(fileName){try{const res=await fetch("./"+fileName+"?v="+Date.now(),{cache:"no-store"});if(!res.ok)throw new Error("Could not load "+fileName);const text=await res.text();ticker.textContent=cleanForTicker(text)||"Text file is empty: "+fileName;lastTextFile=fileName;resetTicker()}catch(e){ticker.textContent="Could not load text file: "+fileName+" - check GitHub root folder.";paused=true}}
async function fetchState(){try{const res=await fetch("/.netlify/functions/state",{cache:"no-store"});if(!res.ok)return;const state=await res.json();speed=Number(state.speed??30)*3;paused=Boolean(state.paused);fontSize=Number(state.fontSize??46);ticker.style.fontSize=fontSize+"px";setColours(state.textColor,state.shadowColor);const chosenFile=state.textFile||"hanuman-chalisa.txt";if(state.text&&state.text.length>0){if(Number(state.textVersion||0)!==lastTextVersion){lastTextVersion=Number(state.textVersion||0);ticker.textContent=cleanForTicker(state.text);lastTextFile="temporary";resetTicker()}}else if(chosenFile!==lastTextFile||Number(state.textVersion||0)!==lastTextVersion){lastTextVersion=Number(state.textVersion||0);await loadTextFile(chosenFile)}if(Number(state.jumpRequestId||0)!==lastJumpRequestId){lastJumpRequestId=Number(state.jumpRequestId||0);const jumpSeconds=Number(state.jumpSeconds||0);x-=speed*jumpSeconds;ticker.style.transform=`translate(${x}px, -50%)`}if(Number(state.resetId||0)!==lastResetId){lastResetId=Number(state.resetId||0);resetTicker()}}catch(e){}}
function animate(time){if(lastTime===null)lastTime=time;const dt=(time-lastTime)/1000;lastTime=time;if(!paused){x-=speed*dt;ticker.style.transform=`translate(${x}px, -50%)`;if(x<-ticker.offsetWidth-80)resetTicker()}requestAnimationFrame(animate)}
window.addEventListener("resize",resetTicker);loadTextFile("hanuman-chalisa.txt");fetchState();setInterval(fetchState,700);requestAnimationFrame(animate);
</script>
</body>
</html>
