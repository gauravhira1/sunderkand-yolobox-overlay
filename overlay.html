<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sunderkand Overlay for YoloBox</title>
<style>
:root{--text:#fff;--shadow:#000;--fontSize:48px;--lineHeight:1.42}
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:transparent;font-family:"Noto Sans Devanagari","Mangal","Kokila","Arial Unicode MS",Arial,sans-serif}
#stage{position:fixed;inset:0;background:transparent;overflow:hidden}
#lyricsBox{position:absolute;left:0;right:0;bottom:0;height:32vh;background:transparent;overflow:hidden;pointer-events:none}
#lyrics{position:absolute;left:5vw;right:5vw;top:100%;color:var(--text);font-size:var(--fontSize);line-height:var(--lineHeight);font-weight:800;text-align:center;white-space:pre-line;text-shadow:3px 3px 0 var(--shadow),-2px 2px 0 var(--shadow),2px -2px 0 var(--shadow),-2px -2px 0 var(--shadow);will-change:transform}
</style>
</head>
<body>
<div id="stage"><div id="lyricsBox"><div id="lyrics">Loading Sunderkand...</div></div></div>
<script>
const RAW_URL="https://raw.githubusercontent.com/WirelessAlien/Ramcharitmanas/main/main/data/verses/sundarkanda.json";
const lyrics=document.getElementById("lyrics");
let y=0,speed=30,paused=false,fontSize=48,lastTime=null,lastResetId=0,lastTextVersion=0;

function resetScroll(){y=0;lyrics.style.transform="translateY(0px)"}
function formatSundarkandJson(data){
 return data.map(item=>{
  const n=item["verse-number"]??"";
  const content=(item.content||"").replace(/\r\n/g,"\n").replace(/\r/g,"\n").replace(/\n{3,}/g,"\n\n").trim();
  return `॥ ${n} ॥\n${content}`;
 }).join("\n\n");
}
async function loadDefaultText(){
 try{
  const local=localStorage.getItem("sunderkand_overlay_text");
  if(local&&local.length>1000){lyrics.textContent=local;resetScroll();return}
  const res=await fetch(RAW_URL,{cache:"force-cache"});
  if(!res.ok)throw new Error("Could not load");
  const data=await res.json();
  const text=formatSundarkandJson(data);
  localStorage.setItem("sunderkand_overlay_text",text);
  lyrics.textContent=text;resetScroll();
 }catch(e){
  lyrics.textContent="Could not load Sunderkand text. Open control page and paste text manually.";
  paused=true;
 }
}
async function fetchState(){
 try{
  const res=await fetch("/.netlify/functions/state",{cache:"no-store"});
  if(!res.ok)return;
  const state=await res.json();
  speed=Number(state.speed??speed);
  paused=Boolean(state.paused);
  fontSize=Number(state.fontSize??fontSize);
  lyrics.style.fontSize=fontSize+"px";
  if(Number(state.resetId||0)!==lastResetId){lastResetId=Number(state.resetId||0);resetScroll()}
  if(Number(state.textVersion||0)!==lastTextVersion&&state.text&&state.text.length>0){
   lastTextVersion=Number(state.textVersion||0);
   lyrics.textContent=state.text;
   localStorage.setItem("sunderkand_overlay_text",state.text);
   resetScroll();
  }
 }catch(e){}
}
function animate(time){
 if(lastTime===null)lastTime=time;
 const dt=(time-lastTime)/1000;lastTime=time;
 if(!paused){
  y-=speed*dt;
  lyrics.style.transform=`translateY(${y}px)`;
  const box=document.getElementById("lyricsBox");
  if(lyrics.getBoundingClientRect().bottom<box.getBoundingClientRect().top-80)resetScroll();
 }
 requestAnimationFrame(animate);
}
loadDefaultText();fetchState();setInterval(fetchState,700);requestAnimationFrame(animate);
</script>
</body>
</html>
